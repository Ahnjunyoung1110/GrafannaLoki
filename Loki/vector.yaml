    exclude:
      - /var/log/live/0_101/*.tar
    oldest_first: true
    ignore_older_secs: 10000000000
    remove_after_secs: 600

  # LIVE 로그 (0_102 서버)
  live_files_0_102:
    type: file
    include:
      - /var/log/live/0_102/*
    exclude:
      - /var/log/live/0_102/*.tar
    oldest_first: true
    ignore_older_secs: 10000000000
    remove_after_secs: 600

  # LIVE 로그 (10_101 서버)
  live_files_10_101:
    type: file
    include:
      - /var/log/live/10_101/*
    exclude:
      - /var/log/live/10_101/*.tar  
    oldest_first: true
    ignore_older_secs: 10000000000
    remove_after_secs: 600

  # LIVE 로그 (10_102 서버)
  live_files_10_102:
    type: file
    include:
      - /var/log/live/10_102/*
    exclude:
      - /var/log/live/10_102/*.tar
    oldest_first: true
    ignore_older_secs: 10000000000
    remove_after_secs: 600

    # LIVE 로그 (0_101 서버)
  us_live_files_0_101:
    type: file
    include:
      - /var/log/live/us/0_101/*
    exclude:
      - /var/log/live/us/0_101/*.tar
    oldest_first: true
    ignore_older_secs: 10000000000
    remove_after_secs: 600

  # LIVE 로그 (0_102 서버)
  us_live_files_0_102:
    type: file
    include:
      - /var/log/live/us/0_102/*
    exclude:
      - /var/log/live/us/0_102/*.tar
    oldest_first: true
    ignore_older_secs: 10000000000
    remove_after_secs: 600

  # LIVE 로그 (10_101 서버)
  us_live_files_10_101:
    type: file
    include:
      - /var/log/live/us/10_101/*
    exclude:
      - /var/log/live/us/10_101/*.tar  
    oldest_first: true
    ignore_older_secs: 10000000000
    remove_after_secs: 600

  # LIVE 로그 (10_102 서버)
  us_live_files_10_102:
    type: file
