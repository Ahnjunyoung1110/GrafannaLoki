# =====================================
# 📤 SINKS: Loki 전송 설정
# =====================================
sinks:
  # AWS ALB
  loki_alb:
    type: loki
    inputs: [parse_alb]
    endpoint: "http://loki:3100"
    encoding:
      codec: json
    labels:
      job: "ALB"
      manifest: "{{ manifest }}"
      target_platform: "{{ target_platform }}"
      elb_status_code: "{{ elb_status_code }}"
      target_status_code: "{{ target_status_code }}"
      resolution: "{{ resolution }}"
      channel_group: "{{ channel_group }}" 
    out_of_order_action: "accept"





  # Tencent CDN → Loki
  loki_tencent:
    type: loki
    inputs: [parse_cdn]
    endpoint: "http://loki:3100"
    encoding:
      codec: json
    labels:
      job: "Tencent_cdn"
      host: "{{ cdn_host }}"
      status_code: "{{ status_code }}"
      cache_hit: "{{ cache_hit }}"
      platform: "{{ target_platform }}"
      resolution: "{{ resolution }}"
      channel_group: "{{ channel_group }}"
    out_of_order_action: "accept"

  # CloudFront CDN → Loki
  loki_cf:
    type: loki
    inputs: [cloud_front_cdn]
    endpoint: "http://loki:3100"
    encoding:
      codec: json
    labels:
      job: "CloudFront_cdn"
      host: "{{ cdn_host }}"
      status_code: "{{ status_code }}"
      cache_hit: "{{ cache_hit }}"
      platform: "{{ target_platform }}"
