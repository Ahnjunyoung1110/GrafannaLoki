# ============================================================
# Vector config with detailed comments for Sources / Transforms / Sinks
# - 주석은 모두 `#`만 사용 (복붙 실행 가능)
# - 코드/키 이름은 원본 그대로 유지 (오타도 수정 안함)
# ============================================================

sources:
  # =====================================
  # 📂 SOURCES: 파일 기반 로그 수집
  # =====================================

  # Tencent CDN 로그 (기본 CDN)
  files:
    type: file
    include:
      - /var/log/*.ready            # .ready 확장자 로그 파일
    oldest_first: true              # 오래된 파일부터 순차 처리 (백필 안정화)
    ignore_older_secs: 10000000000  # 오래된 파일도 처리하도록 매우 큰 값
    remove_after_secs: 600          # 처리 완료 후 600초 뒤 파일 삭제

  # CloudFront CDN 로그
  CF_files:
    type: file
    include:
      - /var/log/c_f/*.ready
    oldest_first: true
    ignore_older_secs: 10000000000
    remove_after_secs: 600

  # ADS 로그 (0_25 서버)
  ads_files_0_25:
    type: file
    include:
      - /var/log/ads/0_25/*
    exclude:  
      - /var/log/ads/0_25/*.tar     # 압축된 tar 파일 제외
    oldest_first: true
    ignore_older_secs: 10000000000
    remove_after_secs: 600

  # ADS 로그 (0_26 서버)
