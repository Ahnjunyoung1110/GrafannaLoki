    type: file
    include:
      - /var/log/ads/0_26/*.ready
    exclude:  
      - /var/log/ads/0_26/*.tar
    oldest_first: true
    ignore_older_secs: 10000000000
    remove_after_secs: 600

  # ADS 로그 (10_25 서버)
  ads_files_10_25:
    type: file
    include:
      - /var/log/ads/10_25/*.ready
    exclude:
      - /var/log/ads/10_25/*.tar
    oldest_first: true
    ignore_older_secs: 10000000000
    remove_after_secs: 600

  # ADS 로그 (10_26 서버)
  ads_files_10_26:
