auth_enabled: false

server:
  log_level: "warn"
  http_listen_port: 3100
  grpc_listen_port: 9096
  grpc_server_max_recv_msg_size: 20971520  # 20MB
  grpc_server_max_send_msg_size: 20971520  # 20MB


common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory
  storage:
    filesystem:
      chunks_directory: /loki/chunks   # TSDB에서도 이건 크게 안 쓰이지만 기본값 필요
      rules_directory: /loki/rules

ingester:
  lifecycler:
    ring:
      kvstore:
        store: inmemory
      replication_factor: 1
  chunk_idle_period: 20m
  max_chunk_age: 6h
  chunk_target_size: 5572864 # 5.5MB
  wal:
    enabled: true
    dir: /loki/wal
  chunk_encoding: "gzip"  
  


schema_config:
  configs:
    - from: 2025-07-01
      store: tsdb
      object_store: filesystem      # S3 안 쓰면 filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h


storage_config:
  filesystem:
    directory: /loki/tsdb_blocks
  tsdb_shipper:
    active_index_directory: /loki/index   # 로컬 인덱스 작업 디렉터리
    cache_location: /loki/cache           # 인덱스 캐시 디렉터리
  index_cache_validity: 30s

limits_config:
  reject_old_samples: false
  reject_old_samples_max_age: 4w  # 4주
  max_entries_limit_per_query: 500000
  max_query_series: 1000000
  cardinality_limit: 1000000
  ingestion_rate_mb: 128              # 사용자당 허용 속도 (MB/s)
  ingestion_burst_size_mb: 512        # 일시적 버스트 허용량 (MB)
  max_line_size: 524288               # 한 줄 최대 사이즈 (기본값은 256KB)
  max_streams_per_user: 100000        # 사용자당 활성 스트림 수 제한
  max_global_streams_per_user: 200000 # 클러스터 전체 기준 사용자당 스트림 수 제한
  max_label_name_length: 512
  max_label_value_length: 1024
  max_query_length: 28d
  max_query_parallelism: 128
  query_timeout: 3m
  retention_period: 1344h             # 8주
  max_query_lookback: 0s
  per_stream_rate_limit: 50MB
  per_stream_rate_limit_burst: 100MB


query_range:
  cache_results: true
  max_retries: 5

ruler:
  wal_cleaner:
    min_age: 8h
    period: 1h

  
compactor:
  working_directory: /loki/compactor
  compaction_interval: 30m          # block 병합 주기
  delete_request_cancel_period: 24h # 선택
  retention_enabled: true          # 기본 true, 명시적으로 적어도 됨
  delete_request_store: filesystem

index_gateway:
  mode: simple
