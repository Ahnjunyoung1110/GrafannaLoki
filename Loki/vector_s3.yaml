# =====================================
# 📤 SINKS: Loki 전송 설정
# =====================================
sinks:
  # Tencent CDN → Loki
  loki_tencent:
    type: loki
    inputs: [Tencent_cdn]
    endpoint: "http://loki:3100"
    encoding:
      codec: json
    labels:
      job: "Tencent_cdn"
      host: "{{ cdn_host }}"
      status_code: "{{ status_code }}"
      cache_hit: "{{ cache_hit }}"
      platform: "{{ target_platform }}"
      resolution: "{{ resolution }}"
      channel_group: "{{ channel_group }}"
    out_of_order_action: "accept"

  # CloudFront CDN → Loki
  loki_cf:
    type: loki
    inputs: [CloudFront_cdn]
    endpoint: "http://loki:3100"
    encoding:
      codec: json
    labels:
      job: "CloudFront_cdn"
      host: "{{ cdn_host }}"
      status_code: "{{ status_code }}"
      cache_hit: "{{ cache_hit }}"
      platform: "{{ target_platform }}"
      resolution: "{{ resolution }}"
      channel_group: "{{ channel_group }}"
    out_of_order_action: "accept"

  # Ads → Loki
  apache_logs_ads:
    type: loki
    inputs: [Ads]
    endpoint: "http://loki:3100"
    encoding:
      codec: json
    labels:
      job: "Ads"
      host: "{{ host_id }}"
      target_platform: "{{ target_platform }}"
      status_code: "{{ status }}"
      channel_group: "{{ channel_group }}"
    out_of_order_action: "accept"

  # Live → Loki
  apache_logs_live:
    type: loki
    inputs: [Live]
    endpoint: "http://loki:3100"
    encoding:
      codec: json
    labels:
      job: "Live"
      region: "KR"
      host: "{{ host_id }}"
      target_platform: "{{ target_platform }}"
      status_code: "{{ status }}"
      resolution: "{{ resolution }}"
      channel_group: "{{ channel_group }}"
      manifast: "{{ minifest }}"   # 원문 그대로: 라벨 키는 manifast, 값은 minifest 필드
    out_of_order_action: "accept"

  Unknown:
    type: loki
    inputs: [route_by_service.Unknown, route_by_service._unmatched]
    endpoint: "http://loki:3100"
    encoding:
      codec: json
    labels:
      job: "Unknown"
    out_of_order_action: "accept"

